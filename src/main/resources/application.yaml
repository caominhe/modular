server:
  port: 8080 # Port chạy server backend

spring:
  application:
    name: fcar-backend

  # Cấu hình kết nối MySQL (Cổng 3306)
  datasource:
    # LƯU Ý: Thay 'fcar_db' bằng tên database bạn đã tạo trong MySQL
    url: jdbc:mysql://localhost:3306/fcar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root          # Thay bằng username MySQL của bạn (thường là root)
    password: 123123123        # Thay bằng mật khẩu MySQL của bạn
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Cấu hình JPA & Hibernate
  jpa:
    hibernate:
      # update: Tự động tạo bảng nếu chưa có, và cập nhật cột nếu Entity thay đổi (Rất tốt cho môi trường Dev)
      # validate: Chỉ kiểm tra xem code có khớp với DB không (Dùng cho môi trường Production)
      ddl-auto: update
    show-sql: true # Hiển thị câu lệnh SQL trên console để dễ debug
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true # Format lại câu lệnh SQL cho dễ nhìn trên console

# Cấu hình tự định nghĩa cho JWT Token (Khớp với file JwtTokenProvider.java)
app:
  jwt:
    # Chuỗi Secret Key (Cần độ dài ít nhất 256-bit). Ở môi trường Prod nên đổi chuỗi này và bảo mật kỹ.
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000 # Thời gian sống của Token: 1 ngày (Tính bằng mili-giây)

# Cấu hình Swagger OpenAPI path (Tùy chọn, để mặc định cũng được)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html